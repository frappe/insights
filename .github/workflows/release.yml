name: Generate Semantic Release
on:
  push:
    branches:
      - version-3

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Entire Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24
      - name: Setup dependencies
        run: |
          npm install @semantic-release/git @semantic-release/exec @semantic-release/release-notes-generator conventional-changelog-conventionalcommits --no-save
      - name: Record pre-release state
        id: pre_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')
          echo "tag=${PREV}" >> $GITHUB_OUTPUT
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      - name: Enrich release notes with author mentions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/helpers/enrich_release_notes.sh \
            "${{ steps.pre_release.outputs.tag }}" \
            "${{ github.repository }}"
